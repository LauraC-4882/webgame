<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>解缠线</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="site-header">
      <h1>解缠线</h1>
      <nav>
        <a href="index.html">首页</a>
        <a href="connect.html">刷新本页</a>
      </nav>
    </header>
    <main class="container layout-two">
      <section class="game-shell">
        <h2 class="game-title">解缠线</h2>
        <p class="game-subtitle">拖动发光节点，把所有交叉线路解开。线路不再相交就过关。</p>
        <div id="game-area" class="game-area" data-game="connect"></div>
        <div class="game-controls">
          <button id="start-btn">开始游戏</button>
          <button id="save-btn" class="secondary">保存分数</button>
          <div class="score-box">分数：<span id="score">0</span></div>
          <div class="score-box">状态：<span id="status">待机</span></div>
        </div>
      </section>
      <aside>
        <section class="leaderboard" id="leaderboard"></section>
        <section class="leaderboard">
          <h3>玩法提示</h3>
          <ul class="tip-list" id="tips"></ul>
        </section>
      </aside>
    </main>
    <script src="main.js"></script>
  </body>
</html>
