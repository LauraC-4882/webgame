<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="site-header"><h1>登录</h1><nav><a href="index.html">返回首页</a></nav></header>
    <main class="container auth-forms">
      <h2>欢迎回来</h2>
      <p class="muted">这是前端演示表单，提交后会在本地提示成功。</p>
      <form>
        <label>用户名或邮箱</label>
        <input name="user" required>
        <label>密码</label>
        <input name="password" type="password" required>
        <button type="submit">登录</button>
      </form>
    </main>
    <script src="main.js"></script>
  </body>
</html>
