  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <div class="brand-wrap">
        <a class="logo-orb" href="./index.html"><span class="logo-text">web<br>game</span></a>
        <div class="brand-texts">
          <a class="brand" href="./index.html">Webgame</a>
          <span class="brand-sub">Cyberpunk Arcade</span>
        </div>
      </div>

      <nav class="top-nav">
        <a href="./index.html">home</a>
        <a href="./games/connect.html">connect</a>

        <a href="./login.html">login</a>
        <a class="auth-primary is-current" href="./signup.html">sign up</a>
      </div>
    </header>

    <main class="page auth-page">
      <section class="panel auth-card">
        <p class="eyebrow">sign up</p>
        <h1>Create your account</h1>
        <p>注册后可以设置昵称，和你的赛博角色们一起冲榜。</p>

        <form class="auth-forms">
          <label>用户名</label>
          <input name="username" required>

          <label>邮箱</label>
          <input name="email" type="email" required>

          <label>密码</label>
          <input name="password" type="password" required>

          <button type="submit">注册</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div>
          <div class="footer-title">footnotes</div>

        </div>

          <div class="footer-title">account</div>
          <div class="footer-auth">
            <a href="./login.html">login</a>

        </div>
