<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>注册</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="site-header"><h1>注册</h1><nav><a href="index.html">返回首页</a></nav></header>
    <main class="container auth-forms">
      <h2>创建账号</h2>
      <p class="muted">先把赛博小号建起来，排行榜会更有仪式感。</p>
      <form>
        <label>用户名</label>
        <input name="username" required>
        <label>邮箱</label>
        <input name="email" type="email" required>
        <label>密码</label>
        <input name="password" type="password" required>
        <button type="submit">注册</button>
      </form>
    </main>
    <script src="main.js"></script>
  </body>
</html>
